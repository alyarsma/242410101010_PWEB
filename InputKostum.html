<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nekoya - Rental Baju Cosplay</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Input Kostum Cosplay</h1>
    </header>

    <main>
      <section>
        <h2>Form Input Kostum</h2>

        <form>
          <label>Nama Kostum:</label><br />
          <input type="text" name="nama_kostum" /><br /><br />

          <label>Karakter / Tema:</label><br />
          <input type="text" name="karakter" /><br /><br />

          <label>Ukuran:</label><br />
          <select name="ukuran">
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option></select
          ><br /><br />

          <label>Deskripsi Kostum:</label><br />
          <input type="text" name="deskripsi" /><br /><br />

          <label>Harga Sewa / Hari:</label><br />
          <input type="number" name="harga" /><br /><br />

          <button type="submit">Simpan Data</button>
        </form>
      </section>
    </main>
    <a href="/index.html">Kembali</a>
  </body>
</html>
